<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Progress</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{
font-family:-apple-system;
background:#000;
color:white;
text-align:center;
padding:20px;
}
.card{
background:#111;
padding:20px;
border-radius:20px;
margin-top:20px;
}
.calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:6px;
margin-top:15px;
}
.day{
padding:12px;
background:#1c1c1e;
border-radius:12px;
font-size:14px;
}
.trained{
background:white;
color:black;
}
button{
background:white;
color:black;
padding:14px;
border:none;
border-radius:14px;
font-size:16px;
width:100%;
margin-top:10px;
}
input{
padding:12px;
border-radius:12px;
border:none;
width:90%;
margin-top:10px;
text-align:center;
}
img{
max-width:100%;
border-radius:16px;
margin-top:15px;
}
canvas{
background:white;
border-radius:16px;
margin-top:20px;
}
.small{
opacity:0.6;
font-size:14px;
}
</style>
</head>
<body>

<h1>Progress</h1>

<div class="card">
<h3>📅 Deze maand</h3>
<div id="count"></div>
<div class="calendar" id="calendar"></div>
</div>

<div class="card">
<h3>⚖️ Gewicht</h3>
<input type="number" id="weightInput" placeholder="kg">
<button onclick="saveWeight()">Opslaan</button>
</div>

<div class="card">
<h3>📸 Week foto</h3>
<input type="file" accept="image/*" onchange="savePhoto(event)">
<div id="photoContainer"></div>
</div>

<div class="card">
<h3>📊 Gewicht Progress</h3>
<canvas id="chart"></canvas>
</div>

<script>
let trainingDays=JSON.parse(localStorage.getItem("trainingDays"))||[];

function renderCalendar(){
const cal=document.getElementById("calendar");
cal.innerHTML="";
let today=new Date();
let year=today.getFullYear();
let month=today.getMonth();
let daysInMonth=new Date(year,month+1,0).getDate();

for(let i=1;i<=daysInMonth;i++){
let date=new Date(year,month,i).toDateString();
let div=document.createElement("div");
div.className="day";
if(trainingDays.includes(date)){div.classList.add("trained");}
div.innerText=i;
div.onclick=function(){
if(trainingDays.includes(date)){
trainingDays=trainingDays.filter(d=>d!==date);
}else{
trainingDays.push(date);
}
localStorage.setItem("trainingDays",JSON.stringify(trainingDays));
renderCalendar();
};
cal.appendChild(div);
}
document.getElementById("count").innerText=
trainingDays.length+" trainingen deze maand";
}
renderCalendar();

function saveWeight(){
let w=document.getElementById("weightInput").value;
if(!w)return;
let data=JSON.parse(localStorage.getItem("weights"))||[];
data.push({date:new Date().toLocaleDateString(),weight:w});
localStorage.setItem("weights",JSON.stringify(data));
document.getElementById("weightInput").value="";
updateChart();
}

function savePhoto(event){
const file=event.target.files[0];
const reader=new FileReader();
reader.onload=function(){
localStorage.setItem("weekPhoto",reader.result);
displayPhoto();
}
reader.readAsDataURL(file);
}

function displayPhoto(){
const photo=localStorage.getItem("weekPhoto");
if(photo){
document.getElementById("photoContainer").innerHTML=
'<img src="'+photo+'">';
}
}
displayPhoto();

function updateChart(){
let data=JSON.parse(localStorage.getItem("weights"))||[];
let labels=data.map(d=>d.date);
let weights=data.map(d=>d.weight);
new Chart(document.getElementById("chart"),{
type:"line",
data:{labels:labels,datasets:[{label:"Gewicht",data:weights}]},
options:{responsive:true}
});
}
updateChart();
</script>

</body>
</html>
